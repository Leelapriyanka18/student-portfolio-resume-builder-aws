<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Student Portfolio</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  </head>
<body>

<header class="header">
  <div class="container nav">
    <a href="../index.html" class="logo">SP<span></span></a>

    <button class="menu-btn" id="menuToggle">☰</button>

    <nav class="nav-links" id="navLinks">
      <a href="../index.html#home">Home</a>
      <a href="about.html">About</a>
      <a href="projects.html">Projects</a>
      <a href="resume-builder.html">Resume Builder</a>
      <a href="certificates.html">Certificates</a>
      <a href="contact.html">Contact</a>
    </nav>

    <button class="theme-btn" id="themeToggle">🌙</button>
  </div>
</header>

<main class="page-section">
  <div class="container">
    <div class="hero-grid">

      <div>
        <span class="tag">Member Access</span>

        <h1>Welcome Back</h1>

        <p class="subtitle">
          Sign in to continue managing your portfolio,
          resume builder and certificates.
        </p>

        <div class="hero-actions">
          <a href="register.html" class="btn secondary">
            Create Account
          </a>

          <a href="../index.html#about" class="btn primary">
            Learn More
          </a>
        </div>
      </div>

      <aside class="card form-card">

        <h2>Login</h2>

        <p class="subtitle">
          Enter your credentials.
        </p>

        <form id="loginForm">

          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="email"
              placeholder="Enter Email"
              required>
          </div>

          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="password"
              placeholder="Enter Password"
              required>
          </div>

          <button type="submit" class="btn primary">
            Login
          </button>

        </form>

      </aside>

    </div>
  </div>
</main>

<footer class="footer">
  <div class="container">
    <p>© 2026 Student Portfolio and Resume Builder</p>
  </div>
</footer>

<script>

document.getElementById("loginForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const data = {

        email: document.getElementById("email").value,
        password: document.getElementById("password").value

    };

    try{

        const response = await fetch(

            "http://98.83.139.108:8080/api/auth/login",

            {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body: JSON.stringify(data)

            }

        );

        const result = await response.text();

        if(response.ok){

            // Save Login Session
            localStorage.setItem("loggedIn","true");
            localStorage.setItem("userEmail",data.email);

            alert(result);

            window.location.href="dashboard.html";

        }else{

            alert(result);

        }

    }catch(error){

        alert("Unable to connect to server.");

    }

});

</script>
<script src="../assets/js/script.js"></script>

</body>
</html>
