<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    if (!Auth.requireAuth("login.html")) {
      document.write("");
    }
  </script>
</head>

<body>

<header class="header">
  <div class="container nav">
    <a href="../index.html" class="logo">LP<span>Portfolio</span></a>
  </div>
</header>

<main class="page-section">

<div class="container">

<div class="card">

<h2>Edit Profile</h2>

<form id="profileForm">

<div class="form-group">
<label>Headline</label>
<input type="text" id="headline">
</div>

<div class="form-group">
<label>Bio</label>
<textarea id="bio"></textarea>
</div>

<div class="form-group">
<label>Phone</label>
<input type="text" id="phone">
</div>

<div class="form-group">
<label>Address</label>
<textarea id="address"></textarea>
</div>

<div class="form-group">
<label>LinkedIn URL</label>
<input type="text" id="linkedin">
</div>

<div class="form-group">
<label>GitHub URL</label>
<input type="text" id="github">
</div>

<button type="submit" class="btn primary">
Save Profile
</button>

</form>

</div>

</div>

</main>

<script>

// Load the current user's saved profile once when the edit page opens.
// A 404 is normal for first-time users, so it leaves the form blank silently.
async function loadExistingProfile() {
const user = Auth.getUser();
if (!user || !user.userId) {
  return;
}

try {
  const response = await fetch(
    window.API_BASE + "/api/profile?userId=" + encodeURIComponent(user.userId),
    {
      method: "GET"
    }
  );

  if (response.status === 404) {
    return;
  }

  if (!response.ok) {
    showToast("Unable to load your saved profile. Please try again later.", "error");
    return;
  }

  const profile = await response.json();

  document.getElementById("headline").value = profile.headline || "";
  document.getElementById("bio").value = profile.bio || "";
  document.getElementById("phone").value = profile.phone || "";
  document.getElementById("address").value = profile.address || "";
  document.getElementById("linkedin").value = profile.linkedinUrl || "";
  document.getElementById("github").value = profile.githubUrl || "";
} catch (error) {
  console.error(error);
  showToast("Unable to connect to server while loading your profile.", "error");
}
}

document.addEventListener("DOMContentLoaded", loadExistingProfile);

document.getElementById("profileForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const user = Auth.getUser();
if (!user || !user.userId) {
  showToast("Session expired. Please log in again.", "error");
  Auth.logout("login.html");
  return;
}

const data = {

userId: Number(user.userId),

headline:
document.getElementById("headline").value,

bio:
document.getElementById("bio").value,

phone:
document.getElementById("phone").value,

address:
document.getElementById("address").value,

linkedinUrl:
document.getElementById("linkedin").value,

githubUrl:
document.getElementById("github").value

};

try {
  const response = await fetch(
  window.API_BASE + "/api/profile",
  {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

  }

  );

const result = await response.text();

showToast(result || (response.ok ? "Profile saved successfully." : "Unable to save profile."), response.ok ? "success" : "error");
} catch (error) {
  console.error(error);
  showToast("Unable to connect to server. Check your connection.", "error");
}

});

</script>
<script src="../assets/js/script.js"></script>

</body>
</html>
