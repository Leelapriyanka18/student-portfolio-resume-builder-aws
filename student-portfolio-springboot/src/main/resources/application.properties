spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://resume-builder-db.c7oxuegg0cpn.us-east-1.rds.amazonaws.com:3306/resumebuilder}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_MAX_LIFETIME_MS:1800000}

server.address=0.0.0.0
server.port=${SERVER_PORT:8080}
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

app.jwt.secret=${JWT_SECRET:change-this-development-only-jwt-secret-32-characters-minimum}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://student-portfolio-priyanka-4501.s3-website-us-east-1.amazonaws.com,http://127.0.0.1:5500,http://localhost:5500}
app.auth.rate-limit.max-requests=${AUTH_RATE_LIMIT_MAX_REQUESTS:20}
app.auth.rate-limit.window-ms=${AUTH_RATE_LIMIT_WINDOW_MS:60000}
